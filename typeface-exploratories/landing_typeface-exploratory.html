<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omar The Creative — The Cinematic Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Mono:wght@400;700&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --vibrant-red: #FF1A00;
            --glow: rgba(255, 26, 0, 0.4);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Anton', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a0500 0%, #050505 100%);
        }

        /* FILM GRAIN EFFECT */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Grain.jpg');
            opacity: 0.03;
            pointer-events: none;
            z-index: 10;
        }

        .portal-container {
            text-align: center;
            position: relative;
            z-index: 5;
            width: 100%;
        }

        /* VIBRATION ANIMATION */
        @keyframes vibrate {
            0% { transform: translate(0); text-shadow: 0 0 0 var(--glow); }
            20% { transform: translate(-2px, 2px); text-shadow: 4px 0 10px var(--glow); }
            40% { transform: translate(-2px, -2px); text-shadow: -4px 0 20px var(--glow); }
            60% { transform: translate(2px, 2px); text-shadow: 0 4px 10px var(--glow); }
            80% { transform: translate(2px, -2px); text-shadow: 0 -4px 20px var(--glow); }
            100% { transform: translate(0); text-shadow: 0 0 0 var(--glow); }
        }

        .title {
            font-size: 18vw;
            line-height: 0.8;
            text-transform: uppercase;
            color: var(--vibrant-red);
            letter-spacing: -0.04em;
            animation: vibrate 0.2s infinite ease-in-out;
            filter: blur(0.5px);
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 4vw;
            color: white;
            margin-top: -2vw;
            letter-spacing: -0.02em;
            opacity: 0.9;
        }

        .metadata {
            position: absolute;
            bottom: 4rem;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 4rem;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: var(--vibrant-red);
            opacity: 0.6;
        }

        .viewfinder {
            position: absolute;
            top: 2rem;
            left: 2rem;
            right: 2rem;
            bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
        }

        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--vibrant-red);
        }
        .tl { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
        .tr { top: -1px; right: -1px; border-left: 0; border-bottom: 0; }
        .bl { bottom: -1px; left: -1px; border-right: 0; border-top: 0; }
        .br { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }

    </style>
</head>
<body>
    <div class="viewfinder">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
    </div>

    <div class="portal-container">
        <div class="subtitle">I push brands into culture.</div>
        <h1 class="title">COLDEST</h1>
        <div class="metadata">
            <span>[ MOTION ]</span>
            <span>[ OMAR SILWANY ]</span>
            <span>[ SOUND ]</span>
        </div>
    </div>

    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60vw; height: 60vw; background: radial-gradient(circle, var(--glow) 0%, transparent 70%); z-index: 1; pointer-events: none; opacity: 0.5;"></div>
</body>
</html>
