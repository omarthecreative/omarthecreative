<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exhibits | Omar, the Creative</title>
    <meta name="description" content="A curated overview of brand actions, films, and campaigns.">
    
    <!-- Social Metadata -->
    <meta property="og:site_name" content="Omar, the Creative">
    <meta property="og:title" content="Exhibits | Omar, the Creative">
    <meta property="og:description" content="A curated overview of brand actions, films, and campaigns.">
    <meta property="og:image" content="https://omarthecreative.com/assets/og-image.jpg">
    <meta property="og:url" content="https://omarthecreative.com/exhibits.html">
    <meta property="og:type" content="website">
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤘🏽</text></svg>">
    <link rel="stylesheet" href="https://use.typekit.net/fqr6eyz.css">
    <link rel="stylesheet" href="https://use.typekit.net/niv4qrq.css">
    <link rel="stylesheet" href="base.css">
    <style>
        :root {
            --vibrant-red: #A8002C;
            --glow: rgba(255, 0, 0, 0.8);
        }

        body { background: #050505; color: white; overflow: hidden; height: 100vh; width: 100vw; }

        /* LOCKED BACKGROUND */
        .hero-background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: #000;
            pointer-events: none;
        }
        .hero-bg-image {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('assets/exhibits-bg.jpg');
            background-size: cover;
            background-position: center center;
            filter: brightness(0.4) contrast(1.1);
            opacity: 1;
        }

        /* HUD ELEMENTS */
        .corner-frame {
            position: fixed;
            top: 2rem;
            left: 2rem;
            right: 2rem;
            bottom: 2rem;
            border: 1px solid rgba(255, 0, 60, 0.2);
            pointer-events: none;
            z-index: 100;
        }
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--vibrant-red);
            opacity: 1;
        }
        .tl { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
        .tr { top: -1px; right: -1px; border-left: 0; border-bottom: 0; }
        .bl { bottom: -1px; left: -1px; border-right: 0; border-top: 0; }
        .br { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }

        .hud-tag {
            position: fixed;
            font-family: var(--mono);
            font-size: 0.5rem;
            letter-spacing: 0.2em;
            color: var(--vibrant-red);
            opacity: 0.4;
            pointer-events: none;
            text-transform: uppercase;
            z-index: 100;
        }
        .hud-tl { top: 0.8rem; left: 2rem; }
        .hud-tr { top: 0.8rem; right: 2rem; }
        .hud-bl { bottom: 0.8rem; left: 2rem; }
        .hud-br { bottom: 0.8rem; right: 2rem; }

        /* Nav — standard fixed elements */
        .nav-name {
            position: fixed;
            top: 4rem;
            left: 4rem;
            color: white;
            text-decoration: none;
            font-family: var(--serif);
            font-size: 1.5rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-weight: 900;
            z-index: 10000;
        }
        .menu-trigger {
            position: fixed;
            top: 4rem;
            right: 4rem;
            font-family: var(--mono);
            font-size: 0.55rem;
            letter-spacing: 0.3em;
            color: white;
            opacity: 0.8;
            cursor: pointer;
            text-transform: uppercase;
            z-index: 10000;
            transition: opacity 0.3s ease;
        }
        .menu-trigger:hover { opacity: 1; color: var(--vibrant-red); }

        /* Full Screen Menu Overlay */
        #apex-menu {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 20000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .menu-close {
            position: absolute;
            top: 4rem; right: 4rem;
            font-family: var(--mono);
            font-size: 0.55rem;
            letter-spacing: 0.2em;
            color: var(--vibrant-red);
            cursor: pointer;
        }
        .menu-links {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .menu-link {
            font-family: var(--display);
            font-size: clamp(60px, 15vw, 280px);
            line-height: 0.65;
            text-transform: uppercase;
            color: #FFFFFF;
            text-decoration: none;
            letter-spacing: -0.07em;
            transition: all 0.3s ease;
            opacity: 0.1;
            margin: 0.5rem 0;
        }
        .menu-link:hover { opacity: 1; color: var(--vibrant-red); }
        .menu-link.active { opacity: 1; color: var(--vibrant-red); }

        /* Exhibits Grid — No Scroll Layout */
        .exhibits-container {
            height: 100vh;
            padding: 8rem 8rem 6rem 4rem; /* Nudged left */
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }
        
        /* GHOST WATERMARK — PROJECTED FEEL */
        .exhibits-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: var(--display);
            font-size: 35vw;
            line-height: 0.7;
            letter-spacing: -0.05em;
            color: white;
            opacity: 0.12;
            pointer-events: none;
            z-index: 1;
            text-transform: uppercase;
            white-space: nowrap;
            text-align: center;
            mix-blend-mode: screen;
            filter: blur(2px);
        }

        .exhibits-grid {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(12, 1fr);
            gap: 2.5rem;
            min-height: 0;
            z-index: 10;
            margin-top: 2rem;
        }

        .exhibit-card {
            cursor: pointer;
            position: relative;
            transition: opacity 0.5s ease, filter 0.5s ease;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .exhibit-card:hover {
            transform: scale(1.025);
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 20;
        }

        .exhibit-thumb-wrap {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
        }
        .exhibit-thumb {
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            opacity: 0.9;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            filter: contrast(1.05) brightness(1.05);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .exhibit-card:hover .exhibit-thumb {
            opacity: 0.4;
            filter: contrast(1.1) brightness(0.5) blur(3px);
        }

        /* CENTERED LABELS */
        .exhibit-info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translateY(-50%);
            width: fit-content;
            text-align: left;
            pointer-events: none;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .exhibit-card:hover .exhibit-info {
            opacity: 1;
        }
        .exhibit-brand {
            font-family: var(--display);
            font-size: clamp(0.8rem, 2vw, 2.5rem); /* Scaled down 50% */
            line-height: 0.8;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            color: var(--vibrant-red);
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
            margin-top: -0.2vw;
        }
        .exhibit-campaign {
            font-family: var(--serif);
            font-style: italic;
            font-size: clamp(0.4rem, 0.5vw, 0.7rem); /* Scaled down 50% */
            letter-spacing: 0.01em;
            color: white;
            text-transform: none;
            margin-bottom: 0.1vw;
            white-space: pre-line;
            line-height: 1.1;
        }

        /* ASYMMETRICAL GRID LAYOUT (12 COL × 12 ROW) — MAXIMIZED DISTRIBUTION */
        .card-0 { grid-column: 1 / 7;  grid-row: 1 / 6; }  /* Google (Large Opener) */
        .card-1 { grid-column: 7 / 10;  grid-row: 1 / 4; }  /* Samsung Tomorrow */
        .card-2 { grid-column: 10 / 13; grid-row: 1 / 5; }  /* Bud Light */
        .card-3 { grid-column: 9 / 12;  grid-row: 5 / 8; }  /* Legence (Enlarged) */
        .card-4 { grid-column: 5 / 9;   grid-row: 4 / 8; }  /* Citi (Centered) */
        .card-5 { grid-column: 1 / 5;   grid-row: 7 / 11; transform: translateY(2.5rem); } /* Samsung Play */
        .card-6 { grid-column: 5 / 13;  grid-row: 8 / 13; } /* MBK Alliance (Large Closer) */

        /* --- RESPONSIVE BREAKPOINTS --- */

        /* LANDSCAPE - MOBILE & TABLET (EXACT MATCH TO INDEX.HTML) */
        @media (orientation: landscape) and (max-width: 1366px) {
            .exhibits-container { padding: 4rem 4rem 8rem 8rem; }
            .exhibits-watermark { font-size: 34vw; } /* Reduced from 36vw */
            .exhibits-grid { gap: 1.5rem; }
            .exhibit-brand { font-size: clamp(1rem, 2.5vw, 3rem); }
            .exhibit-campaign { font-size: clamp(0.5rem, 1vw, 1.2rem); white-space: pre-line !important; }
            .card-0 { transform: translateX(-6.0rem); } 
            .card-0:hover { transform: translateX(-6.0rem) scale(1.025); } 
            
            /* Fix card-5 jumping in landscape tablet */
            .card-5 { transform: translateY(2.5rem); }
            .card-5:hover { transform: translateY(2.5rem) scale(1.025); }
            
            /* Match landing page exact positions */
            .nav-name { top: 3.5rem !important; left: 3.5rem !important; font-size: 1.2rem !important; }
            .menu-trigger { top: 3.5rem !important; right: 3.5rem !important; font-size: 0.7rem !important; opacity: 1 !important; }
            
            .hud-tag { opacity: 0.4 !important; } 
            .hud-tl { top: 0.8rem !important; left: 2rem !important; } 
            .hud-tr { top: 0.8rem !important; right: 2rem !important; }
            .hud-bl { bottom: 0.8rem !important; left: 2rem !important; }
            .hud-br { bottom: 0.8rem !important; right: 2rem !important; }
            
            .copyright-tag.fixed { 
                display: block !important; 
                bottom: 0.8rem !important; 
                left: 50% !important; 
                transform: translateX(-50%) !important;
                z-index: 10000 !important;
                opacity: 0.4 !important;
            }

            /* Mobile Landscape Specific (Short Viewports) — TYPOGRAPHIC INDEX */
            @media (max-height: 600px) {
                body { overflow: hidden !important; height: 100vh !important; }
                .nav-name { top: 1.5rem !important; left: 2.5rem !important; font-size: 1rem !important; }
                .menu-trigger { top: 1.5rem !important; right: 2rem !important; font-size: 0.6rem !important; }
                .corner-frame { top: 1rem !important; left: 1.5rem !important; right: 1.5rem !important; bottom: 1rem !important; }
                
                .hud-tag { font-size: 0.4rem !important; opacity: 0.5 !important; }
                .hud-tl { top: 0.25rem !important; left: 2rem !important; }
                .hud-tr { top: 0.25rem !important; right: 2rem !important; }
                .hud-bl { bottom: 0.25rem !important; left: 2rem !important; }
                .hud-br { bottom: 0.25rem !important; right: 2rem !important; }
                
                .copyright-tag { display: none !important; }
                .exhibits-watermark { display: none !important; }
                
                .exhibits-container { 
                    height: 100vh !important; 
                    padding: 5rem 4rem 3rem !important; 
                    display: flex !important;
                    align-items: center !important;
                    justify-content: center !important;
                    overflow: hidden !important;
                }
                
                /* 3-COLUMN TYPOGRAPHIC CONTACT SHEET */
                .exhibits-grid { 
                    display: grid !important;
                    grid-template-columns: repeat(3, 1fr) !important;
                    grid-template-rows: auto auto auto !important;
                    gap: 2rem 1.5rem !important;
                    margin-top: 0 !important;
                    width: 100% !important;
                    max-width: 1200px !important;
                }
                .exhibit-card { 
                    height: auto !important; 
                    width: auto !important; 
                    grid-column: auto !important; 
                    grid-row: auto !important; 
                    transform: none !important;
                }
                .exhibit-thumb-wrap { display: none !important; } 
                .exhibit-info { 
                    position: relative !important; 
                    opacity: 1 !important; 
                    display: flex !important;
                    flex-direction: column !important;
                    top: auto !important; left: auto !important; 
                    transform: none !important;
                    text-align: left !important;
                    align-items: flex-start !important;
                    pointer-events: auto !important;
                }
                .exhibit-brand { 
                    font-size: 1.2rem !important; 
                    line-height: 0.8 !important; 
                    color: var(--vibrant-red) !important;
                    text-shadow: 0 0 10px rgba(0,0,0,0.3) !important;
                }
                .exhibit-campaign { 
                    font-family: var(--serif) !important;
                    font-style: italic !important;
                    font-size: 0.6rem !important; 
                    color: white !important;
                    margin-bottom: 0.2rem !important; 
                    white-space: nowrap !important;
                    opacity: 1 !important;
                }
                
                /* Center the final project in its own row */
                .card-6 { grid-column: 2 / 3 !important; }
            }
            
            /* Aggressive hide for mobile landscape copyright */
            @media (max-height: 600px) {
                .copyright-tag { display: none !important; opacity: 0 !important; visibility: hidden !important; pointer-events: none !important; }
                .exhibits-watermark { 
                    display: block !important; 
                    font-size: 66vh !important; 
                    opacity: 0.1 !important; 
                    filter: blur(3px) !important;
                }
            }
        }

        /* PORTRAIT - MOBILE & TABLET (EXACT MATCH TO INDEX.HTML) */
        @media (orientation: portrait) and (max-width: 1366px) {
            body { overflow: hidden; height: 100vh; }
            .exhibits-container { 
                height: 100vh; 
                padding: 4rem 4rem 6rem; 
                width: 100%;
                display: flex;
                flex-direction: column;
            } 
            
            .exhibits-watermark { 
                font-size: 35vw; 
                opacity: 0.1; 
                mix-blend-mode: screen; 
                filter: blur(2px);
                display: block; 
            }
            
            .nav-name { 
                top: 3rem !important; 
                left: 3rem !important; 
                font-size: 0.9rem !important; 
                max-width: 60% !important; 
                line-height: 1.2 !important; 
                opacity: 1 !important;
            }
            .menu-trigger { top: 3rem !important; right: 3rem !important; font-size: 0.7rem !important; opacity: 1 !important; }
            
            .corner-frame { top: 1.5rem !important; left: 1rem !important; right: 1rem !important; bottom: 1.5rem !important; }
            .hud-tag { font-size: 0.45rem !important; opacity: 0.6 !important; letter-spacing: 0.05em !important; }
            .hud-tl { top: 0.3rem !important; left: 1rem !important; }
            .hud-tr { top: 0.3rem !important; right: 1rem !important; }
            .hud-bl { bottom: 0.3rem !important; left: 1rem !important; }
            .hud-br { bottom: 0.3rem !important; right: 1rem !important; }
            
            .copyright-tag.fixed { 
                bottom: 0.3rem !important; 
                font-size: 0.4rem !important; 
                opacity: 0.4 !important;
                display: block !important;
            }

            /* Small Mobile Override — Match landing exactly */
            @media (max-width: 480px) {
                .nav-name { font-size: 0.8rem !important; }
                .exhibits-container { padding: 6.5rem 2.5rem 6rem; }
            }

            /* MOBILE & TABLET ASYMMETRICAL CONTACT SHEET */
            .exhibits-grid { 
                flex-grow: 1;
                grid-template-columns: repeat(12, 1fr); 
                grid-template-rows: repeat(12, 1fr);
                display: grid;
                gap: 1rem; 
                min-height: 0;
            }
            .exhibit-card { height: auto; aspect-ratio: 16/9; transform: none !important; width: 100%; }
            
            /* TINY SCALE SPANS (12x12) */
            .card-0 { grid-column: 1 / 8;  grid-row: 1 / 5; transform: translateY(-1.5rem) !important; } 
            .card-1 { grid-column: 8 / 13; grid-row: 1 / 4; } 
            .card-2 { grid-column: 4 / 11; grid-row: 4 / 7; transform: translateY(-2rem) !important; } 
            .card-3 { grid-column: 1 / 5;  grid-row: 7 / 10; transform: translateY(-2rem) !important; } 
            .card-4 { grid-column: 8 / 13; grid-row: 6 / 10; transform: translate(-2rem, 0.5rem) !important; } 
            .card-5 { grid-column: 1 / 6;  grid-row: 10 / 13; } 
            .card-6 { grid-column: 6 / 13; grid-row: 10 / 13; transform: translateY(-5rem) !important; } 

            .exhibit-info { 
                opacity: 1; 
                pointer-events: auto; 
                position: absolute; 
                bottom: 0.4rem; 
                left: 0.4rem; 
                top: auto;
                transform: none;
                margin-top: 0; 
                width: auto;
                text-align: left;
                align-items: flex-start;
                z-index: 10;
            }
            .exhibit-brand { 
                font-size: 1.3rem; 
                margin-top: 0; 
                text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            }
            .exhibit-campaign { 
                font-size: 0.7rem; 
                margin-bottom: 0.1rem; 
                opacity: 0.9;
                text-shadow: 0 1px 5px rgba(0,0,0,0.8);
                white-space: pre-line !important;
            }
            
            .exhibit-thumb { opacity: 1 !important; filter: none !important; }
            .exhibit-card:hover .exhibit-thumb { opacity: 0.7 !important; }
        }
    </style>
</head>
<body>
    <div class="hero-background">
        <div class="hero-bg-image"></div>
    </div>
    <div class="corner-frame">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>

        <div class="hud-tag hud-tl" id="hud-tc">[ TC 00:00:00:00 ]</div>
        <div class="hud-tag hud-tr" id="lut-toggle" style="pointer-events: auto; cursor: pointer;">[ LUT: REC.709 ]</div>
        <div class="hud-tag hud-bl">[ 24 FPS ]</div>
        <div class="hud-tag hud-br">[ 7 TOTAL ]</div>
    </div>

    <div id="apex-menu">
        <div class="menu-close" onclick="toggleMenu(false)">[ CLOSE // ESC ]</div>
        <div class="menu-links">
            <a href="exhibits.html" class="menu-link active" onclick="playExhibitsSound(event, 'exhibits.html')">EXHIBITS</a>
            <a href="choice-cuts.html" class="menu-link">CHOICE CUTS</a>
            <a href="long-pour.html" class="menu-link">LONG POUR</a>
            <a href="info.html" class="menu-link">INFORMATION</a>
        </div>
    </div>

    <nav class="apex-nav">
        <a href="index.html" class="nav-name" id="nav-name-el">OMAR SILWANY</a>
        <div class="menu-trigger" onclick="toggleMenu(true)">[ MENU ]</div>
    </nav>

    <div class="exhibits-watermark">EXHIBITS</div>

    <main class="exhibits-container">
        <div class="exhibits-grid" id="exhibits-grid">
            <!-- Populated via JS -->
        </div>
    </main>

    <div class="copyright-tag fixed">
        © 2026 OMAR YASSER SILWANY | ALL RIGHTS RESERVED.
    </div>

    <script src="apex-sound.js?v=2"></script>
    <script src="nav-name-reveal.js"></script>
    <script>
        const projects = [
            { title: "GOOGLE", subtitle: "Lose the\nFlash", img: "assets/03-google-pixel-lose-the-flash-scaled-e1772256909967.png" },
            { title: "SAMSUNG", subtitle: "Stay ahead\nof Tomorrow", img: "assets/04-samsung-stay-ahead-tomorrow.jpg" },
            { title: "BUD LIGHT", subtitle: "Home\nAdvantage", img: "assets/07-bud-light-home-advantage.png" },
            { title: "LEGENCE", subtitle: "Built for\nBuilding", img: "assets/06-legence-built-for-building.png" },
            { title: "CITI", subtitle: "Rise", img: "assets/08-citi-rise.png" },
            { title: "SAMSUNG", subtitle: "Study is\nBetter with Play", img: "assets/01-samsung-study-better-play-scaled.png" },
            { title: "MBK ALLIANCE", subtitle: "We Are the Ones", img: "assets/02-mbk-we-are-the-ones-scaled-e1772257041527.png" }
        ];

        function toggleMenu(show) {
            document.getElementById('apex-menu').style.display = show ? 'flex' : 'none';
            document.body.style.overflow = show ? 'hidden' : '';
            if (show && typeof ApexSound !== 'undefined') ApexSound.play('door');
        }

        // HUD & TRACKING LOGIC
        function updateHUD() {
            const viewed = JSON.parse(localStorage.getItem('omar_viewed') || '[]');
            const count = viewed.length;
            document.getElementById('hud-tc').textContent = `[ TC 00:00:00:${count.toString().padStart(2, '0')} ]`;
            
            if (count > 0) {
                const lut = document.getElementById('lut-toggle');
                lut.classList.add('unlocked');
                if (localStorage.getItem('omar_lut') === 'RUBY') {
                    applyRubyLUT(true);
                }
            }
        }

        // LUT Logic
        function applyRubyLUT(active) {
            const lut = document.getElementById('lut-toggle');
            if (active) {
                document.documentElement.style.setProperty('--vibrant-red', '#A8002C');
                document.documentElement.style.setProperty('--glow', 'rgba(255, 0, 0, 1)');
                lut.textContent = '[ LUT: RUBY ]';
                localStorage.setItem('omar_lut', 'RUBY');
            } else {
                document.documentElement.style.setProperty('--vibrant-red', '#A8002C');
                document.documentElement.style.setProperty('--glow', 'rgba(255, 0, 60, 0.8)');
                lut.textContent = '[ LUT: REC.709 ]';
                localStorage.setItem('omar_lut', 'REC.709');
            }
        }

        document.getElementById('lut-toggle').addEventListener('click', () => {
            const viewed = JSON.parse(localStorage.getItem('omar_viewed') || '[]');
            if (viewed.length > 0) {
                const isRuby = localStorage.getItem('omar_lut') === 'RUBY';
                applyRubyLUT(!isRuby);
            }
        });

        // Initialize HUD state
        (function() {
            updateHUD();
        })();

        // Cinematic Sound Trigger: Play 'projector' on load/first interaction
        (function() {
            let started = false;
            function startCinematic() {
                if (started) return;
                started = true;
                if (typeof ApexSound !== 'undefined') {
                    ApexSound.init();
                    ApexSound.play('projector', 1.0); // Full volume for arrival
                }
                document.removeEventListener('mousedown', startCinematic);
                document.removeEventListener('touchstart', startCinematic);
                document.removeEventListener('scroll', startCinematic);
                document.removeEventListener('mousemove', startCinematic);
            }
            
            // Listen for any immediate interaction
            document.addEventListener('mousedown', startCinematic);
            document.addEventListener('touchstart', startCinematic);
            document.addEventListener('scroll', startCinematic);
            document.addEventListener('mousemove', startCinematic);
            
            // Reset flag on pageshow (e.g. back button navigation)
            window.addEventListener('pageshow', (e) => {
                started = false; 
                // Attempt auto-start on show
                setTimeout(startCinematic, 100);
            });

            // Attempt auto-start on initial load
            window.addEventListener('load', () => {
                setTimeout(startCinematic, 100); 
            });
        })();

        function populateGrid() {
            const grid = document.getElementById('exhibits-grid');
            projects.forEach((p, i) => {
                const card = document.createElement('div');
                card.className = `exhibit-card card-${i}`;
                card.innerHTML = `
                    <div class="exhibit-thumb-wrap">
                        <img src="${p.img}" class="exhibit-thumb" alt="${p.title}">
                    </div>
                    <div class="exhibit-info">
                        <div class="exhibit-campaign">${p.subtitle}</div>
                        <div class="exhibit-brand">${p.title}</div>
                    </div>
                `;
                card.onclick = () => window.location.href = `index.html?p=${i}`;
                grid.appendChild(card);
            });
        }

        window.onkeydown = (e) => {
            if (e.key === 'Escape') {
                if (document.getElementById('apex-menu').style.display === 'flex') toggleMenu(false);
                else window.location.href = 'index.html';
            }
        };

        populateGrid();
    </script>
</body>
</html>
