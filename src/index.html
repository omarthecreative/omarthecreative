<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omar, the Creative</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤘🏽</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Mono:wght@400;700&family=Playfair+Display:wght@900&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,700;1,6..72,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="base.css">
    <style>
        :root {
            --vibrant-red: #FF003C;
            --glow: rgba(255, 0, 60, 0.4);
        }
        body { background: #000; margin: 0; padding: 0; }
        .portal-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            background: transparent;
            z-index: 10;
        }
        .bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: #000;
        }
        .project-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1s ease;
            filter: grayscale(1) contrast(1.2) brightness(0.35); 
        }
        .project-bg.active {
            opacity: 0.4; 
        }
        .title {
            font-family: var(--display);
            font-size: 15vw;
            line-height: 0.8;
            font-weight: 400;
            text-transform: uppercase;
            color: var(--vibrant-red);
            letter-spacing: -0.04em;
            text-shadow: 0 0 20px rgba(255, 0, 60, 0.3);
        }
        .subtitle {
            font-family: var(--serif);
            font-style: italic;
            font-size: 3.5vw;
            color: white;
            margin-top: -1.5vw;
            letter-spacing: -0.02em;
            opacity: 1;
            z-index: 5;
        }
        .footer-metadata {
            position: absolute;
            bottom: 4rem;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 4rem;
            font-family: var(--mono);
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: white;
            opacity: 0.8;
            z-index: 100;
        }
        .footer-metadata a { color: inherit; text-decoration: none; }
        .footer-metadata a:hover { color: var(--vibrant-red); }

        .corner-frame {
            position: fixed;
            top: 2rem; left: 2rem; right: 2rem; bottom: 2rem;
            border: 1px solid rgba(255, 0, 60, 0.2);
            pointer-events: none;
            z-index: 100;
        }
        .corner {
            position: absolute;
            width: 20px; height: 20px;
            border: 2px solid var(--vibrant-red);
            opacity: 1;
        }
        .tl { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
        .tr { top: -1px; right: -1px; border-left: 0; border-bottom: 0; }
        .bl { bottom: -1px; left: -1px; border-right: 0; border-top: 0; }
        .br { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }
        
        .info-link {
            position: absolute;
            top: 4rem;
            right: 4rem;
            font-family: var(--mono);
            font-size: 0.55rem;
            letter-spacing: 0.2em;
            color: white;
            opacity: 0.6;
            text-decoration: none;
            text-transform: uppercase;
        }
        .info-link:hover { color: var(--vibrant-red); opacity: 1; }

        .action-group {
            margin-top: 4rem;
            display: flex;
            gap: 1rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 20;
        }
        .action-group.visible { opacity: 1; }

        .btn {
            padding: 1rem 2rem;
            border: 1px solid var(--vibrant-red);
            font-family: var(--mono);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--vibrant-red);
            background: transparent;
            cursor: pointer;
        }
        .btn:hover { background: var(--vibrant-red); color: white; }

        #video-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        #close-video {
            position: absolute;
            top: 2rem; right: 2rem;
            color: white; font-family: var(--mono); font-size: 0.8rem;
            cursor: pointer; z-index: 1001;
            text-transform: uppercase; letter-spacing: 0.2em;
        }

        #intel-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98);
            z-index: 500;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 4rem;
        }
        .intel-content { max-width: 600px; font-family: 'Newsreader', serif; color: white; }
        .intel-role { color: var(--vibrant-red); font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.3em; margin-bottom: 2rem; text-transform: uppercase; }
        .intel-desc { font-size: 1.4rem; line-height: 1.5; letter-spacing: -0.01em; }
        .intel-close { position: absolute; top: 2rem; right: 2rem; font-family: var(--mono); font-size: 0.8rem; color: var(--vibrant-red); cursor: pointer; letter-spacing: 0.2em; }
    </style>
</head>
<body>
    <div id="video-modal">
        <div id="close-video">[ ESC // CLOSE ]</div>
        <div id="vimeo-wrap" style="width: 100%; height: 100%;"></div>
    </div>

    <div id="intel-overlay">
        <div class="intel-close" id="close-intel">[ ESC // CLOSE ]</div>
        <div class="intel-content">
            <div class="intel-role" id="intel-role">CREATIVE DIRECTOR, WRITER</div>
            <div class="intel-desc" id="intel-desc">Observation metadata loading...</div>
        </div>
    </div>

    <div class="corner-frame">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
    </div>

    <div class="bg-container" id="bg-container"></div>

    <main class="portal-wrapper" id="portal">
        <a href="info.html" class="info-link">[ INFO ]</a>
        
        <div style="position: absolute; top: 4rem; left: 4rem; color: white; opacity: 1; font-family: 'Playfair Display', serif; font-size: 1.5rem; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 900;">
            OMAR SILWANY
        </div>
        
        <div class="project-display">
            <div class="subtitle" id="project-subtitle">I craft copy into ideas into<br>scripts into films into culture.</div>
            <h1 class="title animate-vibrate" id="project-title">BROUHAHAHA</h1>
        </div>
        
        <div class="action-group" id="action-group">
            <button class="btn" id="watch-btn">[ WATCH ]</button>
            <button class="btn" id="intel-btn">[ LEARN ]</button>
        </div>
        
        <div class="footer-metadata">
            <a href="long-copy.html">[ LONG COPY ]</a>
            <span class="nav-hint" style="opacity: 0.6;">[ CLICK FOR THE WORK ]</span>
            <a href="deep-cuts.html">[ DEEP CUTS ]</a>
        </div>

        <div style="position: absolute; bottom: 1rem; width: 100%; text-align: center; opacity: 0.2; font-family: var(--mono); font-size: 0.4rem; letter-spacing: 0.1em; pointer-events: none;">
            © 2026 OMAR YASSER SILWANY | ALL RIGHTS RESERVED.
        </div>
    </main>

    <script>
        const projects = [
            { title: "SAMSUNG", subtitle: "Study Is Better With Play", vimeoId: "637229831", img: "01-samsung-study-better-play-scaled.png", role: "CREATIVE DIRECTOR, WRITER", desc: "Turned ADHD into a superpower.<br>Made fidgeting fashionable." },
            { title: "MBK ALLIANCE", subtitle: "We Are The Ones", vimeoId: "267027000", img: "02-mbk-we-are-the-ones-scaled-e1772257041527.png", role: "CREATIVE DIRECTOR, WRITER", desc: "One voice becomes a movement.<br>50 million impressions. Zero paid media." },
            { title: "GOOGLE PIXEL", subtitle: "Lose The Flash", vimeoId: "306235541", img: "03-google-pixel-lose-the-flash-scaled-e1772256909967.png", role: "CREATIVE DIRECTOR, WRITER", desc: "Dracula sells cameras now.<br>The flash is officially dead." },
            { title: "SAMSUNG", subtitle: "Stay Ahead Of Tomorrow", vimeoId: "442857172", img: "04-samsung-stay-ahead-tomorrow.png", role: "CREATIVE DIRECTOR, WRITER", desc: "Samsung wanted to sell 5G devices.<br>We sold Gen Z their own skepticism instead." },
            { title: "LEGENCE", subtitle: "Built For Building", vimeoId: "1080884698", img: "06-legence-built-for-building.png", role: "CREATIVE DIRECTOR, ART", desc: "We made infrastructure sexy.<br>Turned MEP into a rallying cry." },
            { title: "BUD LIGHT", subtitle: "Home Advantage", vimeoId: "154384335", img: "07-bud-light-home-advantage.png", role: "CREATIVE DIRECTOR, COPY", desc: "Super Bowl 50 needed a bottle.<br>We gave it a time machine." },
            { title: "CITI", subtitle: "RISE", vimeoId: "812285745", img: "08-citi-rise.png", role: "CREATIVE DIRECTOR, COPY", desc: "$1 trillion in sustainable finance is complex.<br>We gave it one simple direction. Up." }
        ];

        let currentIndex = -1;
        const portal = document.getElementById('portal');
        const titleEl = document.getElementById('project-title');
        const subtitleEl = document.getElementById('project-subtitle');
        const bgContainer = document.getElementById('bg-container');
        const actionGroup = document.getElementById('action-group');
        const watchBtn = document.getElementById('watch-btn');
        const intelBtn = document.getElementById('intel-btn');
        const modal = document.getElementById('video-modal');
        const intelOverlay = document.getElementById('intel-overlay');
        const vimeoWrap = document.getElementById('vimeo-wrap');
        const intelDesc = document.getElementById('intel-desc');
        const intelRole = document.getElementById('intel-role');

        projects.forEach((p, i) => {
            const div = document.createElement('div');
            div.className = 'project-bg';
            div.id = `bg-${i}`;
            div.style.backgroundImage = `url('${p.img}')`;
            bgContainer.appendChild(div);
        });

        portal.addEventListener('click', (e) => {
            if (e.target.closest('.btn') || e.target.closest('.info-link') || e.target.closest('.footer-metadata a')) return;
            currentIndex = (currentIndex + 1) % projects.length;
            const p = projects[currentIndex];
            titleEl.textContent = p.title;
            subtitleEl.textContent = p.subtitle;
            document.querySelectorAll('.project-bg').forEach(bg => bg.classList.remove('active'));
            const bg = document.getElementById(`bg-${currentIndex}`);
            if (bg) bg.classList.add('active');
            actionGroup.classList.add('visible');
        });

        watchBtn.addEventListener('click', () => {
            const p = projects[currentIndex];
            vimeoWrap.innerHTML = `<iframe src="https://player.vimeo.com/video/${p.vimeoId}?autoplay=1&background=0&muted=0&title=0&byline=0&portrait=0" style="width:100%;height:100%;border:none;" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
            modal.style.display = 'flex';
        });

        intelBtn.addEventListener('click', () => {
            const p = projects[currentIndex];
            intelRole.textContent = p.role;
            intelDesc.innerHTML = p.desc;
            intelOverlay.style.display = 'flex';
        });

        document.getElementById('close-video').addEventListener('click', () => { modal.style.display = 'none'; vimeoWrap.innerHTML = ''; });
        document.getElementById('close-intel').addEventListener('click', () => { intelOverlay.style.display = 'none'; });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (modal.style.display === 'flex' || intelOverlay.style.display === 'flex') {
                    modal.style.display = 'none';
                    intelOverlay.style.display = 'none';
                    vimeoWrap.innerHTML = '';
                } else if (actionGroup.classList.contains('visible')) {
                    currentIndex = -1;
                    titleEl.textContent = "BROUHAHAHA";
                    subtitleEl.innerHTML = "I craft copy into ideas into<br>scripts into films into culture.";
                    document.querySelectorAll('.project-bg').forEach(bg => bg.classList.remove('active'));
                    actionGroup.classList.remove('visible');
                }
            }
        });
    </script>
</body>
</html>
