<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMAR SILWANY — Observation Deck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Mono:wght@400;700&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="base.css">
    <style>
        .portal-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            position: relative;
            cursor: pointer;
        }
        .project-display {
            text-align: center;
            width: 100%;
        }
        .title {
            font-family: var(--display);
            font-size: 15vw;
            line-height: 0.8;
            font-weight: 400;
            text-transform: uppercase;
            color: var(--vibrant-red);
            letter-spacing: -0.04em;
            filter: blur(0.5px);
            transition: opacity 0.3s ease;
        }
        .subtitle {
            font-family: var(--serif);
            font-style: italic;
            font-size: 3.5vw;
            color: white;
            margin-top: -1.5vw;
            letter-spacing: -0.02em;
            opacity: 0.9;
            z-index: 5;
        }
        .footer-metadata {
            position: absolute;
            bottom: 4rem;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 4rem;
            font-family: var(--mono);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: var(--vibrant-red);
            opacity: 0.6;
        }
        .corner-frame {
            position: absolute;
            top: 2rem; left: 2rem; right: 2rem; bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
        }
        .corner {
            position: absolute;
            width: 20px; height: 20px;
            border: 2px solid var(--vibrant-red);
        }
        .tl { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
        .tr { top: -1px; right: -1px; border-left: 0; border-bottom: 0; }
        .bl { bottom: -1px; left: -1px; border-right: 0; border-top: 0; }
        .br { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }
        
        .nav-hint {
            position: absolute;
            top: 4rem;
            font-family: var(--mono);
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            color: var(--vibrant-red);
            opacity: 0.4;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="corner-frame">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
    </div>

    <main class="portal-wrapper" id="portal">
        <div class="nav-hint">[ CLICK TO CYCLE OBSERVATIONS ]</div>
        
        <div class="project-display">
            <div class="subtitle" id="project-subtitle">I push brands into culture.</div>
            <h1 class="title animate-vibrate" id="project-title">COLDEST</h1>
        </div>
        
        <div class="footer-metadata">
            <span id="meta-left">[ MOTION ]</span>
            <span id="meta-center">[ OMAR SILWANY ]</span>
            <span id="meta-right">[ SOUND ]</span>
        </div>
    </main>

    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60vw; height: 60vw; background: radial-gradient(circle, var(--glow) 0%, transparent 70%); z-index: -1; pointer-events: none; opacity: 0.5;"></div>

    <script>
        const projects = [
            { title: "SAMSUNG", subtitle: "Study Is Better With Play", year: "2021", tag: "STUDY" },
            { title: "MBK ALLIANCE", subtitle: "We Are The Ones", year: "2017", tag: "IDENTITY" },
            { title: "GOOGLE PIXEL", subtitle: "Lose The Flash", year: "2018", tag: "MOTION" },
            { title: "SAMSUNG", subtitle: "Stay Ahead Of Tomorrow", year: "2021", tag: "FUTURE" },
            { title: "LEGENCE", subtitle: "Built For Building", year: "2025", tag: "SYSTEMS" },
            { title: "BUD LIGHT", subtitle: "Home Advantage", year: "2016", tag: "MOMENT" },
            { title: "CITI RISE", subtitle: "Global Projects", year: "2022", tag: "RISE" }
        ];

        let currentIndex = -1;
        const portal = document.getElementById('portal');
        const titleEl = document.getElementById('project-title');
        const subtitleEl = document.getElementById('project-subtitle');
        const metaLeft = document.getElementById('meta-left');
        const metaRight = document.getElementById('meta-right');

        portal.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % projects.length;
            const p = projects[currentIndex];
            
            titleEl.textContent = p.title;
            subtitleEl.textContent = p.subtitle;
            metaLeft.textContent = `[ ${p.tag} ]`;
            metaRight.textContent = `[ ${p.year} ]`;
        });
    </script>
</body>
</html>
