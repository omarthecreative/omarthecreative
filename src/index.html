<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMAR SILWANY — Observation Deck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Mono:wght@400;700&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="base.css">
    <style>
        .portal-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            position: relative;
        }
        .title {
            font-family: var(--display);
            font-size: 18vw;
            line-height: 0.8;
            font-weight: 400; /* Anton standard */
            text-transform: uppercase;
            color: var(--vibrant-red);
            letter-spacing: -0.04em;
            filter: blur(0.5px);
        }
        .subtitle {
            font-family: var(--serif);
            font-style: italic;
            font-size: 4vw;
            color: white;
            margin-top: -2vw;
            letter-spacing: -0.02em;
            opacity: 0.9;
            z-index: 5;
        }
        .footer-metadata {
            position: absolute;
            bottom: 4rem;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 4rem;
            font-family: var(--mono);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: var(--vibrant-red);
            opacity: 0.6;
        }
        .corner-frame {
            position: absolute;
            top: 2rem; left: 2rem; right: 2rem; bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
        }
        .corner {
            position: absolute;
            width: 20px; height: 20px;
            border: 2px solid var(--vibrant-red);
        }
        .tl { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
        .tr { top: -1px; right: -1px; border-left: 0; border-bottom: 0; }
        .bl { bottom: -1px; left: -1px; border-right: 0; border-top: 0; }
        .br { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }
    </style>
</head>
<body>
    <div class="corner-frame">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
    </div>

    <main class="portal-wrapper">
        <div class="subtitle">I push brands into culture.</div>
        <h1 class="title animate-vibrate">COLDEST</h1>
        
        <div class="footer-metadata">
            <span>[ MOTION ]</span>
            <span>[ OMAR SILWANY ]</span>
            <span>[ SOUND ]</span>
        </div>
    </main>

    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60vw; height: 60vw; background: radial-gradient(circle, var(--glow) 0%, transparent 70%); z-index: -1; pointer-events: none; opacity: 0.5;"></div>
</body>
</html>
